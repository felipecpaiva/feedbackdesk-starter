name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0   # match a current pnpm (v11) so CI exercises the allowBuilds approval, not the lenient pnpm 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22   # pnpm 11 requires Node >= 22.13
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
